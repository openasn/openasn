# corrections.yml — per-ASN corrections to ipverse as-metadata's
# category/networkRole, applied LAST in the flags build (wins over
# as-metadata AND over eyeball_confirm.txt).
#
# Use this file when upstream is verifiably wrong about an ASN and the fix
# doesn't fit a flag list: e.g. a university mislabeled hosting, an ISP
# mislabeled government. Where the correction is genuinely upstream's bug,
# ALSO open a PR/issue against https://github.com/ipverse/as-metadata —
# fixing it at the source helps everyone and keeps this file small.
#
# Schema (every field required except network_role):
#
#   <asn integer>:
#     category: isp | hosting | business | education_research | government_admin | none
#     network_role: tier1_transit | major_transit | midsize_transit |
#                   access_provider | content_network | stub | none   # optional
#     reason: "one sentence: what's wrong and how we know"
#     source_url: "https://evidence"
#     date: YYYY-MM-DD
#
# First entries filed 2026-07-07 — surfaced by the enrichment pilot's
# flywheel (docs/openasn-enrichment-plan-v1.md §17): the LLM draft flagged
# these ipverse category errors and a human verified each against the
# company's own site before publishing. The loader validates every field
# (pipeline/lib/overrides.rb); the PR lint mirrors it (scripts/lint_overrides.rb).

393961:
  category: business
  reason: "Farm Bureau Bank FSB is a private, FDIC-insured federally-chartered savings bank; ipverse as-metadata mislabels it government_admin (misled by the 'Farm Bureau' name)."
  source_url: "https://www.farmbureau.bank/"
  date: 2026-07-07

2020:
  category: business
  reason: "Adhesives Research Inc. is a private specialty-materials / adhesive-tape manufacturer (est. 1961); ipverse as-metadata mislabels it education_research (misled by the word 'Research')."
  source_url: "https://www.adhesivesresearch.com/"
  date: 2026-07-07
