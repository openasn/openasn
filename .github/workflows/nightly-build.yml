name: Build & publish data

# The nightly data build. Lives in THIS repo (not the pipeline repo) on
# purpose: releases publish here, so the repo's own GITHUB_TOKEN is enough
# to upload assets — and once openasn-pipeline is public, the whole nightly
# needs zero secrets.
#
# While openasn-pipeline is PRIVATE, checking it out needs one secret:
#   PIPELINE_REPO_TOKEN — a PAT that can READ openasn/openasn-pipeline
#   (fine-grained: Repository access = openasn-pipeline, Contents: Read;
#   classic `repo` scope also works if org settings block fine-grained).
#   Add it under Settings → Secrets and variables → Actions.
# When the pipeline repo goes public, delete the secret; the fallback to
# github.token takes over automatically.
#
# Maintainer notes:
#   * Cron minute is deliberately off-hour (03:17 UTC): GitHub delays
#     on-the-hour crons under load, and upstreams appreciate the jitter.
#   * jq is preinstalled on ubuntu runners; the as.json parser uses it.
#   * Action majors (checkout v7 / cache v6 / upload-artifact v7) run on
#     Node 24; the previously pinned v4s targeted Node 20, deprecated:
#     https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
#     They need runner >= 2.327.1 - GitHub-hosted ubuntu-latest is always
#     newer; only a concern if this ever moves to self-hosted runners.
#   * On gate failure a `pipeline-failure` issue is opened/updated here so
#     a broken nightly is impossible to miss (license drift, delta trips,
#     upstream URL scheme changes — sapics changed theirs 2026-06-18).

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:
    inputs:
      dated_tag:
        description: "Also cut a dated pinnable release (YYYY-MM-DD)"
        type: boolean
        default: false
  push:
    branches: [main]
    paths:
      - "data/**"
      - "spotchecks.yml"
      - "fetch-manifest.json"
      - ".github/workflows/nightly-build.yml"
  pull_request:
    paths:
      - "data/**"
      - "spotchecks.yml"
      - "fetch-manifest.json"

concurrency:
  group: data-build
  cancel-in-progress: false # never kill a publish mid-upload

permissions:
  actions: write  # gh workflow enable needs this; unspecified permissions are not writable.
  contents: write # create/update releases in this repo
  issues: write   # open pipeline-failure issues

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout data repo (this repo)
        uses: actions/checkout@v7
        with:
          path: data-repo

      - name: Checkout pipeline
        uses: actions/checkout@v7
        with:
          repository: openasn/openasn-pipeline
          path: pipeline-repo
          # Secret needed only while openasn-pipeline is private (see header).
          token: ${{ secrets.PIPELINE_REPO_TOKEN || github.token }}

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"

      # GitHub auto-disables cron workflows in public repos after 60 days
      # WITHOUT COMMITS — and a healthy data repo is exactly one that can
      # go quiet between curation PRs while the nightly hums along. The
      # documented reset is re-enabling the workflow via API, which counts
      # as workflow activity. Run this BEFORE the pipeline so even a gate
      # failure still resets the schedule's inactivity timer.
      - name: Keep the schedule alive through commit-quiet periods
        if: github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow enable nightly-build.yml --repo ${{ github.repository }} || true

      # Upstream downloads are cached between runs so conditional GETs
      # (ETag) can 304 and we stay polite to third-party mirrors.
      - name: Restore upstream download cache
        uses: actions/cache@v6
        with:
          path: pipeline-repo/build/cache
          key: upstream-cache-${{ github.run_id }}
          restore-keys: upstream-cache-

      - name: Run pipeline (fetch → gates → compile → validate → publish)
        env:
          OPENASN_DATA_REPO: ${{ github.workspace }}/data-repo
          # Publish only on scheduled runs and manual dispatch — never from
          # PRs or ordinary pushes (those validate only).
          PUBLISH: ${{ (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && '1' || '0' }}
          OPENASN_DATED_TAG: ${{ inputs.dated_tag == true && '1' || '' }}
          GH_TOKEN: ${{ github.token }}
        working-directory: pipeline-repo
        run: |
          # Weekly pinnable snapshot: Sundays on the scheduled run.
          if [ "${{ github.event_name }}" = "schedule" ] && [ "$(date -u +%u)" = "7" ]; then
            export OPENASN_DATED_TAG=1
          fi
          ruby pipeline/run.rb

      - name: Upload artifacts for inspection (PR/push builds)
        if: always() && github.event_name != 'schedule'
        uses: actions/upload-artifact@v7
        with:
          name: openasn-dist
          path: pipeline-repo/build/dist/
          retention-days: 7
          if-no-files-found: ignore

      # A failed nightly must page a human. Reuses one open issue instead
      # of spamming a new one per failure night.
      - name: Open/update pipeline-failure issue
        if: failure() && github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          title="Nightly data build failed"
          body="The scheduled data build failed: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          Most likely causes (see the job log for the gate that tripped):
          - Pipeline checkout: PIPELINE_REPO_TOKEN missing/expired (needed while openasn-pipeline is private)
          - License gate: an upstream changed its license text (data/licenses/ pins)
          - Delta gate: a layer's record count moved more than ±20% overnight
          - Crosscheck: ipverse as-metadata category quality collapsed
          - An upstream URL scheme changed (sapics did this 2026-06-18)"
          existing=$(gh issue list --label pipeline-failure --state open --json number --jq '.[0].number' || true)
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "Failed again: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          else
            gh issue create --title "$title" --body "$body" --label pipeline-failure
          fi
